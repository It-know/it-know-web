name = "itknow-contact-form"
main = "worker-form.js"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# KV namespace para rate limiting
[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"  # Reemplaza tras: wrangler kv:namespace create "RATE_LIMIT_KV"
preview_id = "xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"  # Reemplaza tras: wrangler kv:namespace create "RATE_LIMIT_KV" --preview

# Variables de entorno (secrets - NO commitear valores reales)
[vars]
# SENDGRID_API_KEY = "SG.xxxxx"  # Configura via: wrangler secret put SENDGRID_API_KEY
# TURNSTILE_SECRET_KEY = "0x4AAAAAAA..."  # Configura via: wrangler secret put TURNSTILE_SECRET_KEY

# Rutas
[triggers]
routes = [
  { pattern = "it-know.com/api/contact", zone_name = "it-know.com" }
]
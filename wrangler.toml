name = "it-know-web"
main = "worker-form.js"
compatibility_date = "2026-06-16"
compatibility_flags = ["nodejs_compat"]

# Solo enrutar el endpoint del formulario. Evita que el Worker intercepte
# la pagina principal y devuelva 405 a las visitas normales del sitio.
routes = [
  { pattern = "it-know.com/api/contact", zone_name = "it-know.com" },
  { pattern = "www.it-know.com/api/contact", zone_name = "it-know.com" }
]

# KV namespace para rate limiting
# CREA PRIMERO: wrangler kv:namespace create "RATE_LIMIT_KV"
# Y: wrangler kv:namespace create "RATE_LIMIT_KV" --preview
# LUEGO REEMPLAZA LOS IDs DE ABAJO:
[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "7f3204f0cb7d4c0d9b22e3323bf2988a"
preview_id = "b18451a346674523b27d541275580692"

# Variables de entorno (secrets - NO commitear valores reales)
# CONFIGURA EN DASHBOARD: Workers & Pages → it-know-web → Settings → Variables
# O: wrangler secret put RESEND_API_KEY
# Sender verificado en Resend:
# RESEND_FROM_EMAIL = "IT-Know <noreply@it-know.com>"
# O: wrangler secret put TURNSTILE_SECRET_KEY
[vars]
RESEND_FROM_EMAIL = "IT-Know <noreply@it-know.com>"
